stages:
  - lint
  - test
  - build

default:
  image: node:20
  before_script:
    - npm install -g pnpm
    - pnpm install --frozen-lockfile

lint:
  stage: lint
  script:
    - pnpm lint

test:
  stage: test
  script:
    - pnpm test

build:
  stage: build
  script:
    - pnpm build
  artifacts:
    paths:
      - "**/dist/"
